<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的雲端 PWA 鬧鐘</title>
    <!-- iOS 專用主畫面全螢幕配置 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="雲端鬧鐘">
    <!-- 引入 PWA 數位身分證 -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #0b0f19; color: #fff; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-6">

    <div class="max-w-md w-full bg-slate-900 border border-slate-800 p-6 rounded-3xl shadow-xl text-center">
        <h1 class="text-2xl font-bold mb-2">⏰ 雲端鬧鐘 PWA</h1>
        <p class="text-xs text-slate-400 mb-6">iOS 16.4+ 獨立桌面推播通知版</p>

        <!-- 當前時間 -->
        <div class="text-4xl font-mono font-bold text-indigo-400 py-6 bg-slate-950 rounded-2xl mb-6">
            <span id="live-time">00:00:00</span>
        </div>

        <button id="btn-notify" class="w-full bg-indigo-600 py-3 rounded-xl font-bold hover:bg-indigo-500 transition mb-3">
            🔔 1. 開啟通知授權 (必按)
        </button>
        <p class="text-[10px] text-slate-500">注意：iPhone 使用者請務必從 Safari 分享「加入主畫面」後開啟本 App 點擊授權。</p>
    </div>

    <script>
        // 更新時鐘
        setInterval(() => {
            const now = new Date();
            document.getElementById('live-time').textContent = now.toTimeString().split(' ')[0];
        }, 1000);

        // 註冊 Service Worker 隱形小管家
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker 註冊成功:', reg.scope))
                    .catch(err => console.log('Service Worker 註冊失敗:', err));
            });
        }

        // 通知權限申請
        document.getElementById('btn-notify').addEventListener('click', () => {
            if ('Notification' in window) {
                Notification.requestPermission().then(perm => {
                    if (perm === 'granted') {
                        alert('✨ 通報授權成功！您的手機現在能接收雲端排程鬧鐘了。');
                    } else {
                        alert('❌ 授權失敗，請前往手機設定允許此主畫面的通知功能。');
                    }
                });
            } else {
                alert('您的手機目前尚未將此網頁「加入主畫面」，或不支援此功能。');
            }
        });
    </script>
</body>
</html>
